# Fly.io configuration for the Bundley admin app.
# NOTE: `app` must be globally unique on Fly. `fly launch` will prompt to set it
# (and rewrite this value) if "bundley" is taken.
app = "bundley"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

# Run database migrations once per deploy, before the new version goes live.
[deploy]
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
